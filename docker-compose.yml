services:
  postgres:
    image: postgres:18-alpine
    container_name: myDb_postres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - myDb-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U post_user -d post_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
   postgres_data:
     driver: local

networks:
  myDb-network:
    driver: bridge